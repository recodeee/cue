    - meta/skill-reviewer
    - meta/description-optimizer
    - meta/skill-eval
    - meta/cli-writer
    - meta/mcp-finder
    # Existing meta skills
    - meta/skill-discovery
    - meta/skill-suggestion
    - meta/profile-optimizer
    - meta/cue-usage
    - meta/plugin-creator
    # Workflow codification
    - gstack/skillify
    # Quality & awareness
    - meta/full-output-enforcement   # no truncated SKILL.md output
    - meta/analyze                   # read codebase before writing
    - meta/retro                     # session retrospective
    - meta/workspace-recipes         # route to Justfile when skill is overkill
    - meta/profile-fit-monitor       # notices when profile doesn't match work
    - meta/acpx                      # advanced Claude Code patterns
    - meta/builtin-manager           # manage built-in skills
    - meta/profile-suggest           # suggest profiles for a project
    - meta/save-profile              # save current profile state
    - meta/smithery-usage            # MCP marketplace usage
    - meta/soul                      # soul identity management
    - meta/upgrade-stack             # upgrade cue stack

