name: rust
icon: "🦀"
description: All-in-one Rust profile — async, web, CLI/TUI, embedded, FFI, WASM, game, perf, docs, releases
inherits: rust-core
skills:
  local:
    # Runtime + serialization
    - rust/async-tokio
    - rust/serde
    - rust/tracing
    # Web services
    - rust/axum-api
    - rust/reqwest
    - rust/sqlx-cli
    - rust/cargo-chef
    # CLI / TUI
    - rust/clap-cli
    - rust/ratatui-tui
    # Embedded / no_std
    - rust/embedded
    - rust/no-std
    # FFI (Python / Node / Kotlin+Swift / C)
    - rust/pyo3
    - rust/napi-rs
    - rust/uniffi
    - rust/bindgen
    - rust/cbindgen
    # WASM
    - rust/wasm-rust
    # Game / simulation
    - rust/bevy
    # Perf
    - rust/cargo-flamegraph
    # Quality (beyond the gates in rust-core)
    - rust/cargo-hack
    - rust/cargo-mutants
    - rust/cargo-fuzz
    - rust/snapshot-testing
    - rust/property-testing
    - rust/typos-spellcheck
    # Docs
    - rust/mdbook
    - rust/cargo-readme
    # Releases + cross-platform
    - rust/release-plz
    - rust/cargo-msrv
    - rust/cross-compile
  npx:
    # Daily-pattern playbook from the actionbook team (720 installs) — complements the local pack with idiomatic recipes.
    - repo: actionbook/rust-skills
      skills: [rust-daily]
mcps: []
