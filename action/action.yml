name: 'cue-ci'
description: 'Validate .cue-profile and profile.yaml on PRs — report token budget, block on threshold'
author: 'NagyVikt'
branding:
  icon: 'zap'
  color: 'purple'

inputs:
  token-threshold:
    description: 'Maximum allowed tokens per profile (fails if exceeded)'
    required: false
    default: '50000'
  profile:
    description: 'Profile to validate (default: reads from .cue-profile)'
    required: false
  comment:
    description: 'Post a PR comment with the report'
    required: false
    default: 'true'

outputs:
  score:
    description: 'Profile efficiency score (0-100)'
  grade:
    description: 'Letter grade (A+ to F)'
  tokens:
    description: 'Total token budget'
  passed:
    description: 'Whether the threshold check passed (true/false)'

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install cue
      shell: bash
      run: |
        npm install -g cue-ai@latest

    - name: Resolve profile
      id: resolve
      shell: bash
      run: |
        if [ -n "${{ inputs.profile }}" ]; then
          PROFILE="${{ inputs.profile }}"
        elif [ -f ".cue-profile" ]; then
          PROFILE=$(cat .cue-profile | tr -d '\n')
        else
          echo "::warning::No .cue-profile found and no profile input specified"
          echo "passed=true" >> $GITHUB_OUTPUT
          exit 0
        fi
        echo "profile=$PROFILE" >> $GITHUB_OUTPUT

    - name: Validate profile
      id: validate
      shell: bash
      run: |
        PROFILE="${{ steps.resolve.outputs.profile }}"
        if [ -z "$PROFILE" ]; then exit 0; fi

        # Run validation
        cue validate "$PROFILE" 2>&1 | tee /tmp/cue-validate.txt || true

        # Get score
        SCORE_JSON=$(cue score --profile "$PROFILE" --json)
        SCORE=$(echo "$SCORE_JSON" | jq -r '.score')
        GRADE=$(echo "$SCORE_JSON" | jq -r '.grade')
        TOKENS=$(echo "$SCORE_JSON" | jq -r '.tokens')

        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "grade=$GRADE" >> $GITHUB_OUTPUT
        echo "tokens=$TOKENS" >> $GITHUB_OUTPUT

        # Threshold check
        THRESHOLD=${{ inputs.token-threshold }}
        if [ "$TOKENS" -gt "$THRESHOLD" ]; then
          echo "passed=false" >> $GITHUB_OUTPUT
          echo "::error::Profile '$PROFILE' exceeds token threshold: $TOKENS > $THRESHOLD"
        else
          echo "passed=true" >> $GITHUB_OUTPUT
        fi

    - name: Cost comparison
      id: cost
      shell: bash
      run: |
        PROFILE="${{ steps.resolve.outputs.profile }}"
        if [ -z "$PROFILE" ]; then exit 0; fi
        cue cost "$PROFILE" --json > /tmp/cue-cost.json || true

    - name: Post PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const score = '${{ steps.validate.outputs.score }}';
          const grade = '${{ steps.validate.outputs.grade }}';
          const tokens = '${{ steps.validate.outputs.tokens }}';
          const passed = '${{ steps.validate.outputs.passed }}';
          const profile = '${{ steps.resolve.outputs.profile }}';
          const threshold = '${{ inputs.token-threshold }}';

          if (!profile) return;

          const status = passed === 'true' ? '✅' : '❌';
          const body = `## ${status} cue-ci: Profile Validation

          | Metric | Value |
          |--------|-------|
          | Profile | \`${profile}\` |
          | Score | **${grade}** (${score}/100) |
          | Token Budget | ${Number(tokens).toLocaleString()} |
          | Threshold | ${Number(threshold).toLocaleString()} |
          | Status | ${passed === 'true' ? 'Passed ✅' : 'Failed ❌ — exceeds threshold'} |

          <sub>Generated by <a href="https://github.com/opencue/claude-code-skills">cue-ci</a></sub>`;

          // Find existing comment
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body?.includes('cue-ci: Profile Validation'));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Fail if threshold exceeded
      if: steps.validate.outputs.passed == 'false'
      shell: bash
      run: exit 1
