<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" fill="none" role="img" aria-label="cuecards interactive TUI — browse profiles, skills, and skill detail side by side">
  <style>
    .colhead  { font: 700 12px ui-monospace, 'SF Mono', Menlo, monospace; fill: #e8e8f2; letter-spacing: 1.5px; }
    .cnt      { font: 700 12px ui-monospace, 'SF Mono', Menlo, monospace; fill: #5b6472; }
    .row      { font: 13px ui-monospace, 'SF Mono', Menlo, monospace; fill: #c6c6d6; }
    .rowact   { font: 700 13px ui-monospace, 'SF Mono', Menlo, monospace; fill: #f4f4fa; }
    .cat      { font: 12px ui-monospace, 'SF Mono', Menlo, monospace; fill: #565f6e; letter-spacing: 0.5px; }
    .more     { font: 12px ui-monospace, 'SF Mono', Menlo, monospace; fill: #4d5563; }
    .detkey   { font: 13px ui-monospace, 'SF Mono', Menlo, monospace; fill: #7c879a; }
    .detval   { font: 13px ui-monospace, 'SF Mono', Menlo, monospace; fill: #c6c6d6; }
    .head     { font: 700 15px ui-monospace, 'SF Mono', Menlo, monospace; fill: url(#acc); }
    .sub      { font: 700 13px ui-monospace, 'SF Mono', Menlo, monospace; fill: #9aa4ff; }
    .bul      { font: 13px ui-monospace, 'SF Mono', Menlo, monospace; fill: #aeb2c2; }
    .pill     { font: 700 10px ui-monospace, 'SF Mono', Menlo, monospace; letter-spacing: 0.6px; }
    .foot     { font: 12px ui-monospace, 'SF Mono', Menlo, monospace; fill: #6b7280; }
    .footk    { font: 700 12px ui-monospace, 'SF Mono', Menlo, monospace; fill: #cfcfe0; }
    .barttl   { font: 12px ui-monospace, 'SF Mono', Menlo, monospace; fill: #6b7280; }
  </style>
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect x="0.5" y="0.5" width="1099" height="699" rx="14" fill="#0b0b10" stroke="#1c1c26"/>
  <!-- title bar -->
  <rect x="0.5" y="0.5" width="1099" height="40" rx="14" fill="#13131c"/>
  <rect x="0.5" y="26" width="1099" height="15" fill="#13131c"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="20" r="6" fill="#febc2e"/>
  <circle cx="68" cy="20" r="6" fill="#28c840"/>
  <text x="550" y="25" text-anchor="middle" class="barttl">cuecards — interactive catalog</text>

  <!-- column dividers -->
  <line x1="300" y1="41" x2="300" y2="660" stroke="#1c1c26"/>
  <line x1="662" y1="41" x2="662" y2="660" stroke="#1c1c26"/>
  <!-- footer divider -->
  <line x1="1" y1="660" x2="1099" y2="660" stroke="#1c1c26"/>

  <!-- ===== COLUMN HEADERS ===== -->
  <text x="20" y="68" class="colhead">PROFILES</text>
  <text x="314" y="68" class="colhead">SKILLS <tspan class="cnt">(106)</tspan></text>
  <text x="678" y="68" class="colhead">META/ANALYZE</text>

  <!-- ===== COLUMN A: profiles ===== -->
  <!-- highlighted row (google-ads) -->
  <rect x="6" y="332" width="288" height="22" rx="5" fill="#1c2a3a"/>
  <rect x="6" y="332" width="3" height="22" rx="1.5" fill="url(#acc)"/>

  <g>
    <circle cx="20" cy="99" r="3.5" fill="#f59e0b"/><text x="34" y="103" class="row">affiliate</text>
    <circle cx="20" cy="120" r="3.5" fill="#38bdf8"/><text x="34" y="124" class="row">aws</text>
    <circle cx="20" cy="141" r="3.5" fill="#a78bfa"/><text x="34" y="145" class="row">backend</text>
    <circle cx="20" cy="162" r="3.5" fill="#a78bfa"/><text x="34" y="166" class="row">backend-base</text>
    <circle cx="20" cy="183" r="3.5" fill="#34d399"/><text x="34" y="187" class="row">blog-writer</text>
    <circle cx="20" cy="204" r="3.5" fill="#60a5fa"/><text x="34" y="208" class="row">browser</text>
    <circle cx="20" cy="225" r="3.5" fill="#f472b6"/><text x="34" y="229" class="row">career</text>
    <circle cx="20" cy="246" r="3.5" fill="#fb923c"/><text x="34" y="250" class="row">caveman-quick</text>
    <circle cx="20" cy="267" r="3.5" fill="#22d3ee"/><text x="34" y="271" class="row">claude-api</text>
    <circle cx="20" cy="288" r="3.5" fill="#4ade80"/><text x="34" y="292" class="row">coolify</text>
    <circle cx="20" cy="309" r="3.5" fill="#818cf8"/><text x="34" y="313" class="row">core</text>
    <circle cx="20" cy="330" r="3.5" fill="#f43f5e"/><text x="34" y="334" class="row">creative-media</text>
    <circle cx="20" cy="351" r="3.5" fill="#eab308"/><text x="34" y="349" class="rowact">google-ads</text>
    <circle cx="20" cy="372" r="3.5" fill="#a3e635"/><text x="34" y="376" class="row">google-analytics</text>
    <circle cx="20" cy="393" r="3.5" fill="#2dd4bf"/><text x="34" y="397" class="row">gstack</text>
    <circle cx="20" cy="414" r="3.5" fill="#c084fc"/><text x="34" y="418" class="row">higgsfield</text>
    <circle cx="20" cy="435" r="3.5" fill="#fb7185"/><text x="34" y="439" class="row">instagram</text>
    <circle cx="20" cy="456" r="3.5" fill="#38bdf8"/><text x="34" y="460" class="row">linear</text>
    <circle cx="20" cy="477" r="3.5" fill="#fbbf24"/><text x="34" y="481" class="row">marketing</text>
    <circle cx="20" cy="498" r="3.5" fill="#94a3b8"/><text x="34" y="502" class="row">nextjs</text>
    <circle cx="20" cy="519" r="3.5" fill="#84cc16"/><text x="34" y="523" class="row">postgres</text>
    <circle cx="20" cy="540" r="3.5" fill="#3b82f6"/><text x="34" y="544" class="row">python</text>
    <circle cx="20" cy="561" r="3.5" fill="#fb923c"/><text x="34" y="565" class="row">rust</text>
    <!-- active profile -->
    <circle cx="20" cy="582" r="3.5" fill="#22c55e"/><text x="34" y="586" class="rowact">skill-writer</text>
    <text x="266" y="586" class="pill" fill="#22c55e">active</text>
  </g>
  <text x="34" y="616" class="more">▾ 28 more</text>

  <!-- ===== COLUMN B: skills ===== -->
  <!-- highlighted skill row (meta/analyze) -->
  <rect x="306" y="111" width="350" height="22" rx="5" fill="#1c2a3a"/>
  <rect x="306" y="111" width="3" height="22" rx="1.5" fill="url(#acc)"/>

  <g>
    <text x="314" y="103" class="cat">— meta ——————————————</text>
    <circle cx="320" cy="127" r="3.5" fill="#f59e0b"/><text x="334" y="131" class="rowact">meta/analyze</text>
    <circle cx="320" cy="148" r="3.5" fill="#f59e0b"/><text x="334" y="152" class="row">meta/cue-usage</text>
    <circle cx="320" cy="169" r="3.5" fill="#f59e0b"/><text x="334" y="173" class="row">meta/help</text>
    <circle cx="320" cy="190" r="3.5" fill="#f59e0b"/><text x="334" y="194" class="row">meta/prompt-master</text>
    <circle cx="320" cy="211" r="3.5" fill="#f59e0b"/><text x="334" y="215" class="row">meta/liedetector</text>
    <circle cx="320" cy="232" r="3.5" fill="#f59e0b"/><text x="334" y="236" class="row">meta/smart-loader</text>
    <circle cx="320" cy="253" r="3.5" fill="#f59e0b"/><text x="334" y="257" class="row">meta/roi-estimator</text>

    <text x="314" y="282" class="cat">— caveman ———————————</text>
    <circle cx="320" cy="306" r="3.5" fill="#a855f7"/><text x="334" y="310" class="row">caveman/caveman</text>
    <circle cx="320" cy="327" r="3.5" fill="#a855f7"/><text x="334" y="331" class="row">caveman/caveman-commit</text>

    <text x="314" y="356" class="cat">— plan ——————————————</text>
    <circle cx="320" cy="380" r="3.5" fill="#14b8a6"/><text x="334" y="384" class="row">plan/office-hours</text>
    <circle cx="320" cy="401" r="3.5" fill="#14b8a6"/><text x="334" y="405" class="row">plan/investigate</text>
    <circle cx="320" cy="422" r="3.5" fill="#14b8a6"/><text x="334" y="426" class="row">plan/autoplan</text>

    <text x="314" y="451" class="cat">— review ————————————</text>
    <circle cx="320" cy="475" r="3.5" fill="#ec4899"/><text x="334" y="479" class="row">review/code-review</text>
    <circle cx="320" cy="496" r="3.5" fill="#ec4899"/><text x="334" y="500" class="row">review/code-review-deep</text>

    <text x="314" y="525" class="cat">— security ——————————</text>
    <circle cx="320" cy="549" r="3.5" fill="#ef4444"/><text x="334" y="553" class="row">security/cso</text>

    <text x="314" y="582" class="cat">— browser ———————————</text>
    <circle cx="320" cy="606" r="3.5" fill="#60a5fa"/><text x="334" y="610" class="row">browser/lightpanda</text>
  </g>
  <text x="334" y="640" class="more">▾ 84 more</text>

  <!-- ===== COLUMN C: detail (META/ANALYZE) ===== -->
  <!-- frontmatter card -->
  <rect x="678" y="84" width="392" height="78" rx="8" fill="#101019" stroke="#20202c"/>
  <text x="694" y="106" class="detkey">name: <tspan class="detval">analyze</tspan></text>
  <text x="694" y="128" class="detkey">description: <tspan class="detval">"Runs read-only deep</tspan></text>
  <text x="694" y="148" class="detval">repository analysis and returns a…"</text>

  <text x="678" y="196" class="head">Analyze — Read-Only Deep Analysis</text>

  <text x="678" y="226" class="sub">Use $analyze when</text>
  <circle cx="684" cy="246" r="2.5" fill="#22d3ee"/><text x="696" y="250" class="bul">you want a grounded explanation, not edits</text>
  <circle cx="684" cy="268" r="2.5" fill="#22d3ee"/><text x="696" y="272" class="bul">the answer spans multiple files</text>
  <circle cx="684" cy="290" r="2.5" fill="#22d3ee"/><text x="696" y="294" class="bul">several plausible explanations compete</text>
  <circle cx="684" cy="312" r="2.5" fill="#22d3ee"/><text x="696" y="316" class="bul">you want to understand architecture</text>

  <text x="678" y="350" class="sub">Do not use when</text>
  <circle cx="684" cy="370" r="2.5" fill="#64748b"/><text x="696" y="374" class="bul">you want code edits or a new feature</text>
  <circle cx="684" cy="392" r="2.5" fill="#64748b"/><text x="696" y="396" class="bul">it's a simple one-file fact lookup</text>

  <!-- contract badge -->
  <rect x="678" y="420" width="206" height="28" rx="14" fill="#10231e" stroke="#1c3a30"/>
  <circle cx="698" cy="434" r="4" fill="#22c55e"/>
  <text x="712" y="438" class="pill" fill="#5eead4">READ-ONLY BY CONTRACT</text>

  <text x="678" y="486" class="sub">Evidence rules</text>
  <text x="678" y="510" class="bul"><tspan fill="#fbbf24" font-weight="700">1.</tspan> Evidence — supported by concrete code</text>
  <text x="678" y="532" class="bul"><tspan fill="#fbbf24" font-weight="700">2.</tspan> Inference — a reasoned conclusion</text>
  <text x="678" y="554" class="bul"><tspan fill="#fbbf24" font-weight="700">3.</tspan> Unknown — the repo can't answer it</text>

  <!-- ===== FOOTER STATUS BAR ===== -->
  <text x="20" y="685" class="foot">focus: <tspan class="footk">profiles</tspan>   <tspan class="footk">[up/dn]</tspan> nav   <tspan class="footk">[tab]</tspan> pane   <tspan class="footk">[&lt; &gt;]</tspan> resize   <tspan class="footk">[enter]</tspan> open   <tspan class="footk">[q]</tspan> quit</text>
</svg>
