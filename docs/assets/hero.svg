<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" fill="none" role="img" aria-label="cuecards — Agent Profile Manager">
  <style>
    .t-brand    { font: 800 76px -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; letter-spacing: -2.8px; fill: url(#heroAccent); }
    .t-tagline    { font: 700 15px -apple-system, BlinkMacSystemFont, system-ui, sans-serif; fill: #e2e8f0; letter-spacing: -0.2px; }
    .t-tagline-em { font: 800 15px -apple-system, BlinkMacSystemFont, system-ui, sans-serif; fill: url(#heroAccent); letter-spacing: -0.2px; }
    .t-tagline-sub { font: 700 11px 'SF Mono', 'Fira Code', monospace; fill: #64748b; letter-spacing: 2.5px; }
    .t-pain     { font: 800 30px -apple-system, system-ui, sans-serif; fill: #cbd5e1; letter-spacing: -0.7px; }
    .t-hl       { font: 800 30px -apple-system, system-ui, sans-serif; fill: #f8fafc; letter-spacing: -0.7px; }
    .t-sub      { font: 13px -apple-system, system-ui, sans-serif; fill: #94a3b8; }
    .t-cmd      { font: 13px 'SF Mono', monospace; fill: #f1f5f9; }
    .stat-n     { font: 800 22px -apple-system, system-ui, sans-serif; fill: #f8fafc; }
    .stat-n-acc { font: 800 22px -apple-system, system-ui, sans-serif; fill: #fbbf24; }
    .stat-l     { font: 10px 'SF Mono', monospace; fill: #94a3b8; letter-spacing: 1.2px; }
    .strike     { stroke: #ef4444; stroke-width: 4; stroke-linecap: round; }

    /* terminal list */
    .term-mono   { font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace; }
    .row-name    { font: 13px 'SF Mono', monospace; fill: #cbd5e1; }
    .row-name-sel{ font: 700 13px 'SF Mono', monospace; fill: #f8fafc; }
    .row-circle  { font: 12px 'SF Mono', monospace; fill: #475569; }
    .row-section { font: 12px 'SF Mono', monospace; fill: #475569; }
    .row-emoji   { font-size: 13px; }
    .term-prompt { font: 13px 'SF Mono', monospace; fill: #64748b; }
    .term-head   { font: 700 13px 'SF Mono', monospace; fill: #e2e8f0; }
    .term-tab    { font: 600 11px 'SF Mono', monospace; fill: #64748b; }

    .num { opacity: 0; }
    .num-0 { animation: showNum0 4s ease-in-out forwards; }
    .num-1 { animation: showNum1 4s ease-in-out forwards; }
    .num-2 { animation: showNum2 4s ease-in-out forwards; }
    .num-3 { animation: showNum3 4s ease-in-out forwards; }
    .num-4 { animation: showNum4 4s ease-in-out forwards; }
    .num-5 { animation: showNum5 4s ease-in-out forwards; }
    .num-6 { animation: showNum6 4s ease-in-out forwards; }
    @keyframes showNum0 { 0%, 9% { opacity: 1; } 10%, 100% { opacity: 0; } }
    @keyframes showNum1 { 0%, 9% { opacity: 0; } 10%, 19% { opacity: 1; } 20%, 100% { opacity: 0; } }
    @keyframes showNum2 { 0%, 19% { opacity: 0; } 20%, 29% { opacity: 1; } 30%, 100% { opacity: 0; } }
    @keyframes showNum3 { 0%, 29% { opacity: 0; } 30%, 39% { opacity: 1; } 40%, 100% { opacity: 0; } }
    @keyframes showNum4 { 0%, 39% { opacity: 0; } 40%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @keyframes showNum5 { 0%, 49% { opacity: 0; } 50%, 59% { opacity: 1; } 60%, 100% { opacity: 0; } }
    @keyframes showNum6 { 0%, 59% { opacity: 0; } 60%, 100% { opacity: 1; } }

    .strike-anim { stroke-dasharray: 360; stroke-dashoffset: 360; animation: drawStrike 4s ease-in-out forwards; }
    @keyframes drawStrike { 0%, 74% { stroke-dashoffset: 360; } 92%, 100% { stroke-dashoffset: 0; } }

    .payoff { opacity: 0; animation: fadePayoff 4s ease-in-out forwards; }
    @keyframes fadePayoff { 0%, 94% { opacity: 0; } 100% { opacity: 1; } }

    .term { opacity: 0; animation: termFade 0.9s ease-out 0.3s forwards; }
    @keyframes termFade { from { opacity: 0; } to { opacity: 1; } }

    .active-dot { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

    .cursor { animation: blink 1.1s step-end infinite; }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
  </style>

  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#8b5cf6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="heroAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <pattern id="heroGrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#6366f1" stroke-opacity="0.14" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#818cf8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPink" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#ec4899" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="880" height="480" rx="20" fill="#0b1020"/>
  <rect width="880" height="480" rx="20" fill="url(#heroBg)"/>
  <rect width="880" height="480" rx="20" fill="url(#heroGrid)"/>
  <circle cx="120" cy="120" r="200" fill="url(#glow)" opacity="0.7"/>
  <circle cx="760" cy="380" r="180" fill="url(#glowPink)" opacity="0.55"/>

  <!-- ============ LEFT: brand + marketing ============ -->
  <g transform="translate(56,80)">
    <text x="0" y="0" class="t-brand">cuecards</text>
    <text x="2" y="22" class="t-tagline-sub">PROFILES FOR CODING AGENTS</text>
    <text x="2" y="48" class="t-tagline">The <tspan class="t-tagline-em">missing layer</tspan> between you and your <tspan font-family="'SF Mono', monospace" fill="#f8fafc">agent</tspan>.</text>

    <text x="0" y="108" class="t-pain">Loading <tspan x="145" fill="#fbbf24" class="num num-0">1,927</tspan><tspan x="145" fill="#fbbf24" class="num num-1">1,800</tspan><tspan x="145" fill="#fbbf24" class="num num-2">8,500</tspan><tspan x="145" fill="#fbbf24" class="num num-3">5,600</tspan><tspan x="145" fill="#fbbf24" class="num num-4">3,240</tspan><tspan x="145" fill="#fbbf24" class="num num-5">7,120</tspan><tspan x="145" fill="#fbbf24" class="num num-6">1,927</tspan><tspan x="240"> skills.</tspan></text>
    <line x1="0" y1="97" x2="360" y2="97" class="strike strike-anim" opacity="0.9"/>

    <g class="payoff">
      <text x="0" y="148" class="t-hl">Load <tspan fill="url(#heroAccent)">just what</tspan></text>
      <text x="0" y="184" class="t-hl"><tspan fill="url(#heroAccent)">you need.</tspan></text>
    </g>

    <text x="0" y="216" class="t-sub">Works with <tspan font-family="'SF Mono', monospace" fill="#e5e7eb">claude</tspan> · <tspan font-family="'SF Mono', monospace" fill="#e5e7eb">codex</tspan> · <tspan font-family="'SF Mono', monospace" fill="#e5e7eb">kiro</tspan> <tspan fill="#94a3b8">&amp; any agent harness.</tspan></text>
    <text x="0" y="236" class="t-sub">Per-directory profiles. Materialized runtimes. <tspan fill="#4ade80" font-weight="700">Zero daemons.</tspan></text>

    <g transform="translate(0,272)">
      <g><text x="0" y="0" class="stat-n">49</text><text x="0" y="16" class="stat-l">PROFILES</text></g>
      <g transform="translate(80,0)"><text x="0" y="0" class="stat-n-acc">1,927</text><text x="0" y="16" class="stat-l">SKILLS</text></g>
      <g transform="translate(180,0)"><text x="0" y="0" class="stat-n">15</text><text x="0" y="16" class="stat-l">MCPs</text></g>
      <g transform="translate(238,0)"><text x="0" y="0" class="stat-n">0</text><text x="0" y="16" class="stat-l">DAEMONS</text></g>
    </g>

    <g transform="translate(0,316)">
      <rect width="232" height="38" rx="9" fill="#020617" stroke="#818cf8" stroke-opacity="0.7" stroke-width="1.2"/>
      <text x="14" y="25" font-family="'SF Mono', monospace" font-size="13" fill="#4ade80">$</text>
      <text x="28" y="25" class="t-cmd">npm install -g cue-ai</text>
      <rect x="244" width="100" height="38" rx="9" fill="#020617" stroke="#334155" stroke-opacity="0.6"/>
      <text x="258" y="25" font-family="'SF Mono', monospace" font-size="13" fill="#4ade80">$</text>
      <text x="272" y="25" class="t-cmd">cue</text>
    </g>
  </g>

  <!-- ============ RIGHT: terminal profile picker ============ -->
  <g transform="translate(468,26)" class="term">
    <!-- window -->
    <rect x="0" y="0" width="362" height="428" rx="12" fill="#0a0e1a" fill-opacity="0.96" stroke="#1e293b" stroke-width="1"/>
    <!-- left accent bar (like the screenshot's branch strip) -->
    <rect x="0" y="0" width="3" height="428" rx="2" fill="#38bdf8" fill-opacity="0.8"/>

    <!-- tab/branch bar -->
    <text x="18" y="22" class="term-tab"><tspan fill="#94a3b8">bun</tspan> · <tspan fill="#a78bfa">cue</tspan> · <tspan fill="#4ade80">main</tspan></text>
    <line x1="14" y1="32" x2="348" y2="32" stroke="#1e293b" stroke-width="1"/>

    <!-- prompt -->
    <text x="18" y="54" class="term-prompt"><tspan fill="#a78bfa" font-weight="700">cue</tspan> · pick a profile for <tspan fill="#94a3b8">~/Documents/cue</tspan></text>

    <!-- heading -->
    <text x="18" y="84" class="term-head">Profile</text>

    <!-- list -->
    <g transform="translate(18,100)" class="term-mono">
      <!-- Default (selected) -->
      <rect x="-6" y="-11" width="344" height="17" rx="4" fill="#1e293b" fill-opacity="0.55"/>
      <circle cx="2" cy="-3" r="4" fill="#4ade80" class="active-dot"/>
      <text x="16" y="1" class="row-emoji">⭐</text>
      <text x="34" y="1" class="row-name-sel">Default <tspan fill="#64748b" font-weight="400">(</tspan> <tspan fill="#a78bfa">core</tspan> <tspan fill="#64748b" font-weight="400">)</tspan></text>

      <!-- Recent header -->
      <text x="14" y="21" class="row-section">── Recent ──</text>

      <!-- recent items -->
      <g transform="translate(0,38)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">💼</text><text x="34" y="0" class="row-name">career</text></g>
      <g transform="translate(0,55)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">🐙</text><text x="34" y="0" class="row-name">core</text></g>
      <g transform="translate(0,72)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">🎨</text><text x="34" y="0" class="row-name">skill-writer</text></g>

      <!-- All profiles header -->
      <text x="14" y="92" class="row-section">── All profiles ──</text>

      <!-- all profiles -->
      <g transform="translate(0,109)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">📮</text><text x="34" y="0" class="row-name">postizz</text></g>
      <g transform="translate(0,126)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">🎨</text><text x="34" y="0" class="row-name">designer</text></g>
      <g transform="translate(0,143)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">🦊</text><text x="34" y="0" class="row-name">ecc</text></g>
      <g transform="translate(0,160)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">🦋</text><text x="34" y="0" class="row-name">frontend</text></g>
      <g transform="translate(0,177)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">⚫</text><text x="34" y="0" class="row-name">medusa-dev</text></g>
      <g transform="translate(0,194)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">🤹</text><text x="34" y="0" class="row-name">full</text></g>
      <g transform="translate(0,211)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">💰</text><text x="34" y="0" class="row-name">affiliate</text></g>
      <g transform="translate(0,228)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">🦞</text><text x="34" y="0" class="row-name">backend</text></g>
      <g transform="translate(0,245)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">🐉</text><text x="34" y="0" class="row-name">blog-writer</text></g>
      <g transform="translate(0,262)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">🌐</text><text x="34" y="0" class="row-name">browser</text></g>
      <g transform="translate(0,279)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">🦣</text><text x="34" y="0" class="row-name">caveman-quick</text></g>
      <g transform="translate(0,296)"><text x="0" y="0" class="row-circle">○</text><text x="16" y="0" class="row-emoji">☁️</text><text x="34" y="0" class="row-name">coolify</text></g>

      <!-- scroll indicator / more -->
      <g transform="translate(0,315)">
        <text x="0" y="0" class="row-circle" fill="#334155">⋮</text>
        <text x="34" y="0" font-family="'SF Mono', monospace" font-size="12" fill="#475569">+37 more profiles</text>
        <rect x="200" y="-9" width="3" height="11" fill="#38bdf8" class="cursor"/>
      </g>
    </g>
  </g>
</svg>
