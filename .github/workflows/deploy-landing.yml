name: Deploy Landing Page & Registry
on:
  push:
    branches: [main]
    paths: ['docs/landing/**', 'docs/registry/**', 'profiles/*/profile.yaml']

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Generate registry
        run: |
          mkdir -p docs/landing/registry
          bun src/index.ts skills list --json > docs/landing/registry/index.json 2>/dev/null || echo '[]' > docs/landing/registry/index.json
          cp docs/registry/index.json docs/landing/registry/index.json 2>/dev/null || true

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/landing
      - id: deployment
        uses: actions/deploy-pages@v4
